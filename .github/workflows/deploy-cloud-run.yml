name: Deploy Cloud Run (Citations Engine)

on:
  push:
    branches: [main]
    paths:
      - 'cloud-run/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Create Artifact Registry repository if needed
        run: |
          gcloud artifacts repositories describe citations \
            --location=us-central1 \
            --project=reboost-hub 2>/dev/null || \
          gcloud artifacts repositories create citations \
            --repository-format=docker \
            --location=us-central1 \
            --project=reboost-hub \
            --description="Citations Engine Docker images"

      - name: Build and push Docker image
        run: |
          docker build -t us-central1-docker.pkg.dev/reboost-hub/citations/citations-engine:latest \
            -t us-central1-docker.pkg.dev/reboost-hub/citations/citations-engine:${{ github.sha }} \
            ./cloud-run

          docker push us-central1-docker.pkg.dev/reboost-hub/citations/citations-engine:latest
          docker push us-central1-docker.pkg.dev/reboost-hub/citations/citations-engine:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy citations-engine \
            --image us-central1-docker.pkg.dev/reboost-hub/citations/citations-engine:${{ github.sha }} \
            --region us-central1 \
            --project reboost-hub \
            --quiet
